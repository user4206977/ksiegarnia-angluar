<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="row justify-content-center w-100">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5">
            <div class="glass p-4 p-md-5 text-center shadow-lg">
                <div class="mb-4">
                    <h2 class="fw-bold text-info text-uppercase mt-2">Dołącz do nas</h2>
                    <p class="text-light small">Stwórz konto, aby składać zamówienia</p>
                </div>

                <!-- Komunikat o błędzie -->
                <div *ngIf="errorMessage" class="alert alert-danger-custom mb-4 animate__animated animate__shakeX">
                    <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
                </div>
                
                <form (submit)="onRegister($event)">
                    <!-- Email -->
                    <div class="form-floating mb-3">
                        <input type="email" [(ngModel)]="regData.email" name="email" class="form-control" id="rEmail" placeholder="" required>
                        <label for="rEmail"><i class="bi bi-envelope me-2"></i>Adres e-mail</label>
                    </div>

                    <!-- Imię i Nazwisko -->
                    <div class="row g-2 mb-3">
                        <div class="col-md">
                            <div class="form-floating">
                                <input type="text" [(ngModel)]="regData.imie" name="imie" class="form-control" id="rName" placeholder="" required>
                                <label for="rName">Imię</label>
                            </div>
                        </div>
                        <div class="col-md">
                            <div class="form-floating">
                                <input type="text" [(ngModel)]="regData.nazwisko" name="nazwisko" class="form-control" id="rLName" placeholder="" required>
                                <label for="rLName">Nazwisko</label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Hasło -->
                    <div class="form-floating mb-4">
                        <input type="password" [(ngModel)]="regData.password" name="password" class="form-control" id="rPass" placeholder="" required>
                        <label for="rPass"><i class="bi bi-lock me-2"></i>Hasło</label>
                    </div>

                    <!-- Przycisk -->
                    <button type="submit" [disabled]="isLoading" class="btn btn-info btn-lg w-100 fw-bold mb-4 shadow-sm py-3">
                        <span *ngIf="!isLoading">ZAREJESTRUJ SIĘ</span>
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                    </button>
                    
                    <div class="pt-3 border-top border-white-10">
                        <span class="text-light small">Masz już konto?</span><br>
                        <a routerLink="/login" class="text-info text-decoration-none fw-bold">Zaloguj się teraz</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
